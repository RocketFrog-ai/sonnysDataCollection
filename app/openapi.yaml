      description: 'Tab 2 — the 💰 P&L chart: monthly revenue vs operating expense vs net, with an optional campaign overlay.'
    SiteContextRequest:
      properties:
        address:
          anyOf:
          - type: string
          - type: 'null'
          title: Address
          description: Site address. Optional if latitude/longitude provided.
        latitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Latitude
          description: Pin latitude.
        longitude:
          anyOf:
          - type: number
          - type: 'null'
          title: Longitude
          description: Pin longitude.
        include_ai:
          type: boolean
          title: Include Ai
          description: Also rewrite each dimension's insight with the internal LLM (skipped if unreachable).
          default: false
        demo:
          type: boolean
          title: Demo
          description: 'Anonymized demo: hide the origin address on the markers.'
          default: false
      type: object
      title: SiteContextRequest
      description: 'Synchronous lat/lon site-analysis (the shared map pin). Provide latitude+longitude OR an address.


        Returns weather / competitors / retail anchors / gas stations + map markers + rule-based insights in ONE

        response (no task polling) — the lat/lon counterpart to the async /analyze-site pipeline.'
    TaskStatus:
      type: string
      enum:
      - PENDING
      - STARTED
      - SUCCESS
      - FAILURE
      - RETRY
      - REVOKED
      title: TaskStatus
      description: Task status enumeration
    TaskStatusResponse:
      properties:
        task_id:
          type: string
          title: Task Id
          description: Unique task identifier
        status:
          allOf:
          - $ref: '#/components/schemas/TaskStatus'
          description: Current task status
        result:
          anyOf:
          - {}
          - type: 'null'
          title: Result
          description: Task result if completed
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
          description: Error message if failed
        created_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created At
          description: Task creation timestamp
        completed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed At
          description: Task completion timestamp
      type: object
      required:
      - task_id
      - status
      title: TaskStatusResponse
      description: Response model for task status check
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
