# Auto-generated from the live FastAPI app, enriched with request/response examples.
# Regenerate from the repo root as a MODULE (so app/celery does not shadow the real celery):
#   python -m app.gen_openapi   (conda env sonnysDataCollection)
openapi: 3.1.0
info:
  title: Earnest Proforma backend
  version: '2.0'
  description: 'Backend for the Earnest Proforma Streamlit app — three modes:

    - **Explore markets** (`/v1/pnl_analysis/explore-market*`, `/operators`)

    - **Forecast** (`/v1/pnl_analysis/pinpoint-forecast`, `/pnl-forecast`, `/campaign/*`, `/brands`)

    - **Site analysis** — synchronous `/v1/site-context` and the async `/v1/analyze-site` pipeline.


    Every pin endpoint accepts `latitude`+`longitude` **OR** `address` (geocoded server-side).

    Series are parallel arrays; missing months come through as `null`. Example values are real outputs for the Atlanta GA
    pin (33.7489, -84.3879); long series are trimmed for readability.'
paths:
  /v1/analyze-site:
    post:
      summary: Analyze Site Endpoint
      description: 'Enqueue the fetch pipeline: geocode → fetch weather / competitors / gas / retail (in parallel).

        Returns task_id; poll GET /task/{task_id} until success, then read the per-dimension

        /{dimension}/data-by-task endpoints (fast) and /{dimension}/summary-by-task endpoints (LLM).'
      operationId: analyze_site_endpoint_v1_analyze_site_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyseRequest'
            example:
              address: 1 Peachtree St NE, Atlanta, GA
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
              example:
                task_id: 3f2c1a90-7b6e-4c2d-9a1e-1b2c3d4e5f60
                status: PENDING
                message: Site successfully submitted for analysis
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - Site analysis (async)
  /v1/weather/data-by-task/{task_id}:
    get:
      summary: Get Weather Data By Task
      description: Raw weather metrics (rainy days, snowfall, comfortable days, freezing days) from the fetch.
      operationId: get_weather_data_by_task_v1_weather_data_by_task__task_id__get
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
              example:
                task_id: 3f2c1a90-…
                address: 1 Peachtree St NE, Atlanta, GA
                complete: true
                metrics:
                - metric_key: rainy_days
                  display_name: Rainy days
                  subtitle: per year
                  value: 113.0
                  unit: days
                - metric_key: days_pleasant_temp
                  display_name: Comfortable days
                  subtitle: per year
                  value: 172.0
                  unit: days
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      tags:
      - Site analysis (async)
